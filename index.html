<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bitcoin Pulse — real-time heartbeat of the Bitcoin network" />
  <title>Bitcoin Pulse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="aura" id="aura"></div>

  <!-- Share button -->
  <button class="share-btn" id="share-btn" title="Share as animated GIF">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </svg>
    Share
  </button>

  <!-- Share modal -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <p class="modal-label" id="modal-label">Generating…</p>
      <div class="modal-bar-wrap"><div class="modal-bar" id="modal-bar"></div></div>
      <div class="modal-preview" id="modal-preview"></div>
      <div class="modal-actions" id="modal-actions" hidden>
        <button class="modal-btn primary" id="modal-dl">↓ Download GIF</button>
        <button class="modal-btn" id="modal-link">⧉ Copy link</button>
      </div>
    </div>
  </div>

  <!-- Main stage -->
  <main class="stage">
    <div class="heart-wrap" id="heart-wrap">
      <!-- Two ripple rings — shown only for ALERT / ENERGIZED via CSS -->
      <div class="heart-wrap-ripple"></div>
      <div class="heart-wrap-ripple"></div>
      <div class="heart" id="heart"></div>
    </div>
    <!-- Particle overlay — OUTSIDE heart-wrap to escape the drop-shadow filter -->
    <div class="fx-overlay" id="fx-overlay"></div>
    <p class="status" id="status">BITCOIN IS BALANCED</p>
    <p class="bpm-display" id="bpm-display">— BPM</p>
  </main>

  <!-- Footer HUD — values are always editable inputs -->
  <footer class="hud" id="hud">
    <label class="hud-field">
      <span class="hud-label">Fees</span>
      <input class="hud-input" id="inp-fees" type="number" min="1" max="100" step="1"
             placeholder="—" title="sat/vB (1–100) — edit to override" />
      <span class="hud-unit">sat/vB</span>
    </label>
    <span class="hud-sep">•</span>
    <label class="hud-field">
      <span class="hud-label">Vol</span>
      <input class="hud-input" id="inp-vol" type="number" min="0" max="20" step="0.1"
             placeholder="—" title="24h % (0–20) — edit to override" />
      <span class="hud-unit">%</span>
    </label>
    <span class="hud-sep">•</span>
    <label class="hud-field">
      <span class="hud-label">F&amp;G</span>
      <input class="hud-input" id="inp-fg" type="number" min="0" max="100" step="1"
             placeholder="—" title="0–100 — edit to override" />
    </label>
    <span class="hud-sep">•</span>
    <button class="hud-refresh" id="refresh-btn" title="Reload live API values">
      ↺
    </button>
  </footer>

  <script src="gif.js"></script>
  <script src="pulse.js"></script>
  <script src="app.js"></script>
</body>
</html>
